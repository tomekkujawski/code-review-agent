name: AI Code Review

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Compute PR diff
        run: |
          BASE=${GITHUB_BASE_REF:-master}
          git diff "origin/$BASE...HEAD" > /tmp/pr.diff
          echo "Diff: $(wc -l < /tmp/pr.diff) lines, $(wc -c < /tmp/pr.diff) bytes"

      - name: Run AI review
        id: review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set +eo pipefail
          cat /tmp/pr.diff | npx tsx review.ts > /tmp/review.json
          echo "exit_code=${PIPESTATUS[1]}" >> "$GITHUB_OUTPUT"

      - name: Build and post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node --input-type=module <<'SCRIPT'
          import { readFileSync, writeFileSync } from 'fs';

          let review;
          try {
            review = JSON.parse(readFileSync('/tmp/review.json', 'utf8'));
          } catch {
            writeFileSync('/tmp/comment.md',
              '## 🤖 AI Code Review (Claude Sonnet 4.6)\n\n❌ Nie udało się przetworzyć wyniku agenta.\n');
            process.exit(0);
          }

          const emoji = n => n >= 8 ? '🟢' : n >= 5 ? '🟡' : '🔴';
          const scores = [
            ['Poprawność implementacji',   review.implementationCorrectness],
            ['Idiomatyczność',             review.idiomaticity],
            ['Prostota (odwr. złożoność)', review.complexity],
            ['Testy / ryzyko',             review.testRiskCoverage],
            ['Bezpieczeństwo',             review.securitySafety],
          ];
          const rows = scores.map(([name, n]) => `| ${name} | ${emoji(n)} ${n}/10 |`).join('\n');
          const verdictLabel = review.verdict === 'pass' ? '🟢 PASS' : '🔴 FAIL';

          const comment = [
            '## 🤖 AI Code Review (Claude Sonnet 4.6)',
            '',
            '| Kryterium | Ocena |',
            '| --- | --- |',
            rows,
            '',
            `**Werdykt:** ${verdictLabel}`,
            '',
            '### Szczegóły',
            '',
            review.summary,
            '',
            '---',
            '*Generated by [code-review-agent](https://github.com/tomekkujawski/code-review-agent)*',
          ].join('\n');

          writeFileSync('/tmp/comment.md', comment);
          SCRIPT

          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --body-file /tmp/comment.md
          else
            echo "=== workflow_dispatch — brak PR, podgląd komentarza ==="
            cat /tmp/comment.md
          fi

      - name: Enforce verdict
        run: |
          EXIT="${{ steps.review.outputs.exit_code }}"
          if [ "$EXIT" != "0" ]; then
            echo "::error::Code review: FAIL — merge zablokowany (exit code: $EXIT)"
            exit 1
          fi
          echo "Code review: PASS"
